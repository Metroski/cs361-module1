<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <h1>Student Registration</h1>

    <form action="#" method="post"><!--php file -->

        
        <fieldset>
            <legend>Personal Details</legend>

            <label for="fullname">Full name
                <input type="text" id="fullname" name="fullname" required>
            </label><br>

            <label for="email">Email
                <input type="email" id="email" name="email" required>
            </label><br>

            <label for="phone">Phone
                <input type="tel" id="phone" name="phone" pattern="[0-9]{10}">
            </label><br>

            <label for="dob">Date of birth
                <input type="date" id="dob" name="dob" min="2005-01-01">
            </label><br>

            <span>Gender</span><br>
            <div class="gender">
            <label for="gender-male">Male
                <input type="radio" id="gender-male" name="gender" value="male">
            </label>
            <label for="gender-female">Female
                <input type="radio" id="gender-female" name="gender" value="female">
            </label>
            <label for="gender-other">Other
                <input type="radio" id="gender-other" name="gender" value="other">
            </label><br>
            </div>


            <label for="photo">Profile photo
                <input type="file" id="photo" name="photo" accept="image/*">
            </label>
        </fieldset>

      
        <fieldset>
            <legend>Academic Details</legend>

            <label for="studentid">Student ID
                <input type="text" id="studentid" name="studentid" pattern="[A-Z]{2}[0-9]{2}[0-9]{6}" required>
            </label><br>

            <label for="email2">Email
                <input type="email" id="email2" name="email2" required>
            </label><br>

            <label for="year">Year of study
                <input type="number" id="year" name="year" min="1" max="5">
            </label><br>

            <label for="programme">Programme
                <select id="programme" name="programme">
                    <option value="cs">CS</option>
                    <option value="it">IT</option>
                    <option value="is">IS</option>
                </select>
            </label><br>

               <span id="demo">Specialisation</span><br>
            <div class="flex-container">
             
            <label id="box" for="spec-web">Web
                <input type="checkbox" id="spec-web" name="specialisation" value="web">
            </label>
            <label  id="box" for="spec-security">Security
                <input type="checkbox" id="spec-security" name="specialisation" value="security">
            </label>
            <label  id="box" for="spec-ai">AI
                <input type="checkbox" id="spec-ai" name="specialisation" value="ai">
            </label>
            <label   id="box"for="spec-networks">Networks
                <input type="checkbox" id="spec-networks" name="specialisation" value="networks">
            </label>
            </div>

        </fieldset>

      
        <label for="about">Tell us about yourself
            <textarea id="about" name="about" rows="4" required></textarea>
        </label><br>

     
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
